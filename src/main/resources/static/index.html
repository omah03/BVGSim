<!DOCTYPE html>
<html>
<head>
  <title>BVGSim Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body,html {
      margin:0;
      padding:0;
      height:100%;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
      color:#17202a;
    }
    #controls {
      position:absolute;
      top:16px;
      left:16px;
      width:min(330px, calc(100vw - 32px));
      max-height:calc(100vh - 32px);
      overflow:hidden;
      background:rgba(248,250,252,0.82);
      backdrop-filter:blur(24px) saturate(180%);
      -webkit-backdrop-filter:blur(24px) saturate(180%);
      padding:0;
      border-radius:18px;
      z-index:1000;
      border:1px solid rgba(255,255,255,0.68);
      box-shadow:0 18px 50px rgba(15,23,42,0.18);
      box-sizing:border-box;
    }
    #controls.collapsed {
      width:auto;
      max-width:calc(100vw - 32px);
    }
    #controls.collapsed .panel-body {
      display:none;
    }
    .panel-header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:13px 14px 11px;
      border-bottom:1px solid rgba(148,163,184,0.24);
    }
    .panel-body {
      display:flex;
      flex-direction:column;
      gap:10px;
      padding:10px;
      overflow:auto;
      max-height:calc(100vh - 94px);
    }
    .control-title {
      font-weight:700;
      font-size:15px;
      letter-spacing:0;
      color:#111827;
    }
    .control-group {
      display:flex;
      flex-direction:column;
      gap:8px;
      background:rgba(255,255,255,0.62);
      border:1px solid rgba(226,232,240,0.76);
      border-radius:14px;
      padding:10px;
    }
    .section-title {
      display:flex;
      align-items:center;
      justify-content:space-between;
      color:#475569;
      font-size:11px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.04em;
    }
    .line-toolbar {
      display:flex;
      gap:8px;
      align-items:center;
    }
    input[type="search"],
    select {
      width:100%;
      min-height:36px;
      padding:7px 10px;
      border:1px solid rgba(148,163,184,0.5);
      border-radius:10px;
      background:rgba(255,255,255,0.9);
      color:#102a43;
      font-size:14px;
      box-sizing:border-box;
    }
    .icon-button,
    .clear-button {
      min-height:36px;
      padding:0 11px;
      border:1px solid rgba(148,163,184,0.46);
      background:rgba(255,255,255,0.72);
      color:#334155;
      border-radius:10px;
      cursor:pointer;
      font-weight:700;
      flex-shrink:0;
    }
    .icon-button {
      min-width:36px;
      padding:0;
      font-size:18px;
      line-height:1;
    }
    .line-list {
      max-height:190px;
      overflow:auto;
      border:1px solid rgba(226,232,240,0.84);
      border-radius:12px;
      background:rgba(255,255,255,0.76);
    }
    .line-option {
      display:flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-left:4px solid #64748b;
      border-bottom:1px solid #edf2f7;
      cursor:pointer;
    }
    .line-option:last-child {
      border-bottom:0;
    }
    .line-option input {
      flex-shrink:0;
    }
    .line-option-text {
      display:flex;
      justify-content:space-between;
      gap:8px;
      width:100%;
      min-width:0;
      align-items:baseline;
    }
    .line-option-text strong {
      color:#102a43;
      font-size:14px;
    }
    .line-option-text small {
      color:#64748b;
      font-size:12px;
      white-space:nowrap;
    }
    .empty-state {
      color:#64748b;
      font-size:13px;
      padding:10px;
    }
    select:disabled {
      color:#6b7280;
      background:#f4f6f8;
    }
    #status {
      font-size:12px;
      line-height:1.35;
      color:#52606d;
      padding:0 2px 2px;
    }
    #status.error {
      color:#c2410c;
    }
    #locationNotice {
      display:none;
      font-size:12px;
      line-height:1.35;
      color:#475569;
      background:rgba(241,245,249,0.82);
      border:1px solid rgba(203,213,225,0.82);
      border-radius:12px;
      padding:9px 10px;
    }
    #locationNotice.visible {
      display:block;
    }
    #locationNotice.error {
      color:#9a3412;
      background:rgba(255,247,237,0.9);
      border-color:rgba(251,146,60,0.46);
    }
    #routeInfo {
      display:none;
      background:rgba(239,246,255,0.78);
      border:1px solid rgba(147,197,253,0.58);
      border-radius:12px;
      padding:10px;
      color:#1e3a8a;
      font-size:12px;
      line-height:1.35;
    }
    #routeInfo.visible {
      display:block;
    }
    #routeInfo strong {
      display:block;
      color:#172554;
      font-size:13px;
      margin-bottom:3px;
    }
    #legend {
      position:absolute; bottom:20px; right:20px;
      background:rgba(255,255,255,0.8); padding:10px;
      backdrop-filter:blur(18px) saturate(180%);
      -webkit-backdrop-filter:blur(18px) saturate(180%);
      border-radius:14px; z-index:1000;
      border:1px solid rgba(255,255,255,0.7);
      font-size:12px;
      max-width: 250px;
      box-shadow:0 10px 28px rgba(15,23,42,0.14);
    }
    #legend h4 {
      margin: 0 0 8px 0;
      color: #333;
      font-size: 14px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      margin: 4px 0;
    }
    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid #000;
      margin-right: 8px;
      flex-shrink: 0;
    }
    #map {height:100%;}
    #location-control {
      position:absolute;
      top:12px;
      right:12px;
      z-index:1000;
      min-height:36px;
      padding:0 12px;
      border-radius:12px;
      border:1px solid rgba(148,163,184,0.38);
      background:rgba(255,255,255,0.84);
      color:#102a43;
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      box-shadow:0 8px 22px rgba(15,23,42,0.16);
      cursor:pointer;
      font-weight:700;
    }
    #location-control.active {
      background:#2563eb;
      color:#fff;
    }
    @media (max-width: 640px) {
      #controls {
        top:8px;
        left:8px;
        width:calc(100vw - 16px);
        max-height:calc(100vh - 16px);
      }
      #legend {
        right:8px;
        bottom:12px;
        max-width:calc(100vw - 40px);
      }
      #location-control {
        top:auto;
        right:8px;
        bottom:12px;
      }
    }
  </style>
</head>
<body>
  <div id="controls" aria-label="Bus tracking controls">
    <div class="panel-header">
      <div class="control-title">BVG Bus Tracker</div>
      <button id="togglePanel" class="icon-button" type="button" title="Collapse controls" aria-expanded="true">−</button>
    </div>
    <div class="panel-body">
      <div class="control-group">
        <div class="section-title">
          <label for="lineSearch">Lines</label>
        </div>
        <div class="line-toolbar">
          <input id="lineSearch" type="search" placeholder="Search line..." autocomplete="off" />
          <button id="clearLines" class="clear-button" type="button">Clear</button>
        </div>
        <div id="lineList" class="line-list" aria-label="Selectable bus lines">
          <div class="empty-state">Loading active lines...</div>
        </div>
      </div>
      <div class="control-group" id="vehicleSelectContainer">
        <div class="section-title">
          <label for="vehicleSelect">Bus</label>
        </div>
        <select id="vehicleSelect" disabled>
          <option value="">Select lines first</option>
        </select>
      </div>
      <div id="status">Loading active lines...</div>
      <div id="routeInfo" aria-live="polite"></div>
      <div id="locationNotice" role="status" aria-live="polite"></div>
    </div>
  </div>
  <div id="legend">
    <h4>Selected Lines</h4>
    <div id="legend-content">
      <div class="legend-item">
        <div class="legend-color" style="background-color: #808080;"></div>
        <span>Loading active bus destinations...</span>
      </div>
    </div>
  </div>
  <div id="map"></div>
  <script src="app.js"></script>
</body>
</html>
